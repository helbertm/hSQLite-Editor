name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Validate release pipeline
        run: |
          npm ci
          npm run validate:dependencies
          npm run validate:full:ci

  release-please:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout released source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Build and verify release assets
        run: |
          npm ci
          npm run validate:dependencies
          npm run validate:full
          npm run generate:sbom
          npm run generate:release-checksums
          npm run validate:release-assets

      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/hSQLite-Editor-v${{ needs.release-please.outputs.version }}.html

      - name: Attest release SPDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/hSQLite-Editor-v${{ needs.release-please.outputs.version }}.html
          sbom-path: sbom.spdx.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ needs.release-please.outputs.tag_name }}"
          "dist/hSQLite-Editor-v${{ needs.release-please.outputs.version }}.html"
          sbom.spdx.json
          SHA256SUMS

      - name: Publish immutable release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false
